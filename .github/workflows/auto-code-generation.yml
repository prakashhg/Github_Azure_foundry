name: Auto Code Generation with Azure OpenAI

on:
  issues:
    types:
      - opened
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------
      # DEBUG: Show event info (proves trigger)
      # ----------------------------------------------------
      - name: Debug trigger
        run: |
          echo "Action: ${{ github.event.action }}"
          echo "Issue #: ${{ github.event.issue.number }}"
          echo "Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}"
          echo "New label: ${{ github.event.label.name || 'N/A' }}"

      # ----------------------------------------------------
      # Gate: Stop if not autofix
      # ----------------------------------------------------
      - name: Check autofix label
        id: gate
        run: |
          LABELS="${{ join(github.event.issue.labels.*.name, ',') }}"

          if [[ "${{ github.event.action }}" == "labeled" ]]; then
            if [[ "${{ github.event.label.name }}" == "autofix" ]]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          else
            if [[ "$LABELS" == *"autofix"* ]]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Stop if not autofix
        if: steps.gate.outputs.run != 'true'
        run: |
          echo "ℹ️ Issue is not marked autofix. Exiting safely."
          exit 0

      # ----------------------------------------------------
      # From here onward: REAL WORK
      # ----------------------------------------------------
      - uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "BRANCH=autofix/issue-${{ github.event.issue.number }}" >> $GITHUB_ENV

      - name: Create branch (proof of execution)
        run: |
          git checkout -b "$BRANCH"
          git config user.name "autofix-bot"
          git config user.email "autofix@github.com"
          touch AUTOFIX_TRIGGERED.txt
          echo "Triggered for issue #${{ github.event.issue.number }}" > AUTOFIX_TRIGGERED.txt
          git add .
          git commit -m "autofix trigger proof"
          git push origin "$BRANCH"

name: Auto Code Generation with Azure OpenAI

on:
  issues:
    types: [labeled]   # ✅ Only labeled => ONLY ONE pipeline run

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autofix-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    name: Issue → Azure OpenAI → Branch/Commit → PR → Close Issue
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 0) Guard: Only proceed when label is autofix (case-insensitive)
      #    Job starts always, but exits early if wrong label.
      # ------------------------------------------------------------
      - name: Guard (run only if label is autofix)
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          LABEL="${{ github.event.label.name }}"
          LABEL_LOWER="$(echo "$LABEL" | tr '[:upper:]' '[:lower:]')"

          echo "Event action: ${{ github.event.action }}"
          echo "Label added:  $LABEL_LOWER"
          echo "Issue:        #${{ github.event.issue.number }}"
          echo "Actor:        ${{ github.actor }}"

          if [[ "$LABEL_LOWER" != "autofix" && "$LABEL_LOWER" != "auto-fix" && "$LABEL_LOWER" != "auto fix" ]]; then
            echo "Not an autofix label. Exiting (success) without running automation."
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "Valid autofix label detected. Proceeding..."

      # ------------------------------------------------------------
      # 1) Checkout
      # ------------------------------------------------------------
      - name: Checkout repository
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2) Extract issue title/body
      # ------------------------------------------------------------
      - name: Extract issue details
        if: steps.guard.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV

          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 3) Call Azure OpenAI (retry + capture HTTP)
      #    Artifacts stored in RUNNER_TEMP (won't be committed)
      # ------------------------------------------------------------
      - name: Call Azure OpenAI (retry + capture HTTP)
        if: steps.guard.outputs.run == 'true'
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        shell: bash
        run: |
          set -euo pipefail
          echo "::add-mask::$AZURE_OPENAI_KEY"

          ENDPOINT="${AZURE_OPENAI_ENDPOINT%/}"
          URL="$ENDPOINT/openai/deployments/$AZURE_OPENAI_DEPLOYMENT/chat/completions?api-version=2024-02-15-preview"

          PAYLOAD="$RUNNER_TEMP/payload.json"
          AI_RESP="$RUNNER_TEMP/ai-response.json"
          RESULT="$RUNNER_TEMP/result.json"

          cat > "$PAYLOAD" <<'JSON'
          {
            "temperature": 0.2,
            "messages": [
              {
                "role": "system",
                "content": "You are a senior software engineer. Output ONLY valid JSON. No markdown. No explanations."
              },
              {
                "role": "user",
                "content": "Generate production-ready code for the GitHub issue below.\n\nReturn ONLY JSON with this schema:\n{\n  \"files\": [\n    {\"path\": \"relative/path/to/file.ext\", \"content\": \"file content\"}\n  ],\n  \"summary\": \"short summary\",\n  \"notes\": \"important notes\"\n}\n\nRules:\n- Output JSON only (no markdown)\n- files must be NON-EMPTY array\n- Paths must be relative (no leading /) and must not contain '..'\n- Do NOT modify .github/workflows/auto-code-generation.yml\n- You MAY update existing workflows under .github/workflows/ (like ci.yml) but MUST NOT create new workflow files\n- If repo has no Dockerfile and issue doesn't request one, do NOT create it\n\nISSUE TITLE:\n__TITLE__\n\nISSUE BODY:\n__BODY__\n"
              }
            ]
          }
          JSON

          # Inject title/body safely (PAYLOAD path passed as argument)
          python3 - "$PAYLOAD" <<'PY'
          import json, os, sys
          payload = sys.argv[1]
          with open(payload, "r", encoding="utf-8") as f:
            data = json.load(f)
          title = os.environ.get("ISSUE_TITLE", "")
          body  = os.environ.get("ISSUE_BODY", "")
          data["messages"][1]["content"] = data["messages"][1]["content"].replace("__TITLE__", title).replace("__BODY__", body)
          with open(payload, "w", encoding="utf-8") as f:
            json.dump(data, f, ensure_ascii=False)
          PY

          attempts=3
          HTTP_CODE="000"

          for i in $(seq 1 $attempts); do
            echo "Attempt $i/$attempts calling Azure OpenAI..."
            HTTP_CODE=$(curl -sS -o "$AI_RESP" -w "%{http_code}" \
              "$URL" \
              -H "Content-Type: application/json" \
              -H "api-key: $AZURE_OPENAI_KEY" \
              --data-binary @"$PAYLOAD" || true)

            echo "HTTP_CODE=$HTTP_CODE"
            if [ "$HTTP_CODE" -eq 200 ]; then break; fi

            echo "Waiting 12 seconds before retry..."
            sleep 12
          done

          echo "HTTP_CODE=$HTTP_CODE" >> $GITHUB_ENV
          echo "AI_RESP=$AI_RESP" >> $GITHUB_ENV
          echo "RESULT=$RESULT" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 4) Validate response (fail fast => RED)
      # ------------------------------------------------------------
      - name: Validate Azure OpenAI response (fail fast)
        if: steps.guard.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ Azure OpenAI call failed with HTTP ${HTTP_CODE}"
            echo "Response (truncated):"
            head -c 2000 "$AI_RESP" || true
            exit 1
          fi

          python3 - <<'PY'
          import json, os, sys

          ai_resp = os.environ["AI_RESP"]
          result_path = os.environ["RESULT"]

          with open(ai_resp, "r", encoding="utf-8") as f:
            raw = json.load(f)

          try:
            content = raw["choices"][0]["message"]["content"]
          except Exception:
            print("❌ Missing choices[0].message.content")
            sys.exit(1)

          try:
            result = json.loads(content)
          except Exception as e:
            print("❌ Model did not return valid JSON:", e)
            print(content[:2000])
            sys.exit(1)

          files = result.get("files")
          if not isinstance(files, list) or len(files) == 0:
            print("❌ JSON missing non-empty files[]")
            sys.exit(1)

          with open(result_path, "w", encoding="utf-8") as f:
            json.dump(result, f, ensure_ascii=False, indent=2)

          print("✅ Azure response valid JSON with non-empty files[]")
          PY

      # ------------------------------------------------------------
      # 5) Write generated files safely
      #    - Block traversal/absolute paths
      #    - Block .git/*
      #    - Block modifying THIS workflow file
      #    - Allow editing existing workflow files (ci.yml)
      #    - Block creating new workflow files
      # ------------------------------------------------------------
      - name: Write generated files safely
        if: steps.guard.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys

          result_path = os.environ["RESULT"]
          with open(result_path, "r", encoding="utf-8") as f:
            result = json.load(f)

          blocked_exact = {
            ".github/workflows/auto-code-generation.yml",
            ".github/workflows/auto-code-generation.yaml"
          }
          blocked_prefixes = [".git/"]

          for item in result["files"]:
            path = item.get("path","")
            content = item.get("content","")

            if not isinstance(path, str) or not path.strip():
              print("❌ Invalid file path")
              sys.exit(1)

            # Absolute blocked
            if path.startswith(("/", "\\")):
              print(f"❌ Absolute path blocked: {path}")
              sys.exit(1)

            # Traversal blocked
            if ".." in path.split("/"):
              print(f"❌ Path traversal blocked: {path}")
              sys.exit(1)

            # Block this workflow
            if path in blocked_exact:
              print(f"❌ Protected file blocked: {path}")
              sys.exit(1)

            # Block git internals
            for bp in blocked_prefixes:
              if path.startswith(bp):
                print(f"❌ Protected path blocked: {path}")
                sys.exit(1)

            # If it is a workflow file, allow only if it already exists (no new workflows)
            if path.startswith(".github/workflows/") and not os.path.exists(path):
              print(f"❌ Creating new workflow files is blocked: {path}")
              sys.exit(1)

            os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
            with open(path, "w", encoding="utf-8") as wf:
              wf.write(content)

            print(f"Wrote: {path}")
          PY

      # ------------------------------------------------------------
      # 6) (Optional) Dependency install for issues that add packages
      #    Disabled by default. Enable by adding label "deps"
      # ------------------------------------------------------------
      - name: Detect package manager
        if: steps.guard.outputs.run == 'true'
        id: pm
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f "yarn.lock" ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node (22)
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies (only if label 'deps' exists)
        if: steps.guard.outputs.run == 'true' && contains(join(github.event.issue.labels.*.name, ','), 'deps')
        shell: bash
        run: |
          set -euo pipefail
          echo "deps label detected => running install to update lockfile"

          if [ "${{ steps.pm.outputs.manager }}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile=false
          elif [ "${{ steps.pm.outputs.manager }}" = "yarn" ]; then
            corepack enable
            yarn install --mode update-lockfile
          else
            npm install
          fi

      # ------------------------------------------------------------
      # 7) Branch + commit + push (safe with existing remote branch)
      # ------------------------------------------------------------
      - name: Create branch and commit changes
        if: steps.guard.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -B "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "❌ No changes produced by AI. Failing to avoid empty PR."
            exit 1
          fi

          git commit -m "Auto-fix for issue #$ISSUE_NUMBER"
          git push --force-with-lease origin "$BRANCH"

      # ------------------------------------------------------------
      # 8) PR create/reuse + close issue
      #    - uses PAT if you set PR_CREATOR_TOKEN secret
      #    - else uses default GITHUB_TOKEN (requires repo setting enabled)
      # ------------------------------------------------------------
      - name: Create PR (or reuse existing) and close issue
        if: steps.guard.outputs.run == 'true'
        env:
          DEFAULT_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_CREATOR_TOKEN: ${{ secrets.PR_CREATOR_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          # Choose token: PAT preferred, fallback to GITHUB_TOKEN
          TOKEN="$PR_CREATOR_TOKEN"
          if [ -z "$TOKEN" ]; then
            TOKEN="$DEFAULT_GH_TOKEN"
          fi
          export GH_TOKEN="$TOKEN"

          # Create PR only if it doesn't exist
          if gh pr view --head "$BRANCH" >/dev/null 2>&1; then
            echo "✅ PR already exists for $BRANCH. Skipping PR creation."
          else
            set +e
            gh pr create \
              --title "Auto fix: $ISSUE_TITLE" \
              --body "Auto-generated by Azure OpenAI for issue #$ISSUE_NUMBER." \
              --base main \
              --head "$BRANCH"
            PR_EXIT=$?
            set -e

            if [ "$PR_EXIT" -ne 0 ]; then
              echo "❌ PR creation failed."
              echo "Common fix:"
              echo "Repo Settings → Actions → General → Workflow permissions:"
              echo "- Enable 'Read and write permissions'"
              echo "- Enable 'Allow GitHub Actions to create and approve pull requests'"
              echo ""
              echo "OR set a fine-grained PAT as secret PR_CREATOR_TOKEN with PR+Contents write permissions."
              exit 1
            fi
          fi

          # Close issue only if PR step succeeded
          gh issue close "$ISSUE_NUMBER" --comment "✅ Issue fixed and PR created/updated automatically."
``

name: Auto Code Generation with Azure OpenAI (OIDC + API Key)

on:
  issues:
    types: [labeled]   # ✅ single run

permissions:
  id-token: write      # ✅ required for GitHub OIDC token minting [2](https://bing.com/search?q=GitHub+Actions+is+not+permitted+to+create+or+approve+pull+requests+createPullRequest+allow+GitHub+Actions+to+create+and+approve+pull+requests)
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autofix-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    name: Issue → Azure OpenAI → Branch/Commit → PR → Close Issue
    runs-on: ubuntu-latest

    # ✅ Run only when the added label is autofix (or variants)
    if: >
      github.event.label.name == 'autofix' ||
      github.event.label.name == 'auto-fix' ||
      github.event.label.name == 'auto fix' ||
      github.event.label.name == 'AutoFix' ||
      github.event.label.name == 'Auto-Fix'

    steps:
      # ------------------------------------------------------------
      # 0) Debug trigger
      # ------------------------------------------------------------
      - name: Debug trigger
        shell: bash
        run: |
          echo "action:      ${{ github.event.action }}"
          echo "label added: ${{ github.event.label.name }}"
          echo "issue:       #${{ github.event.issue.number }}"
          echo "actor:       ${{ github.actor }}"

      # ------------------------------------------------------------
      # 1) Checkout
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2) Validate required secrets exist (safe)
      # ------------------------------------------------------------
      - name: Validate required secrets exist (safe)
        shell: bash
        run: |
          set -euo pipefail

          # OIDC for Azure login (Terraform naming)
          [ -n "${{ secrets.ARM_CLIENT_ID }}" ] || (echo "❌ Missing secret: ARM_CLIENT_ID" && exit 1)
          [ -n "${{ secrets.ARM_TENANT_ID }}" ] || (echo "❌ Missing secret: ARM_TENANT_ID" && exit 1)
          [ -n "${{ secrets.ARM_SUBSCRIPTION_ID }}" ] || (echo "❌ Missing secret: ARM_SUBSCRIPTION_ID" && exit 1)

          # Azure OpenAI API-key path (required until custom subdomain is enabled)
          [ -n "${{ secrets.AZURE_OPENAI_ENDPOINT }}" ] || (echo "❌ Missing secret: AZURE_OPENAI_ENDPOINT" && exit 1)
          [ -n "${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" ] || (echo "❌ Missing secret: AZURE_OPENAI_DEPLOYMENT" && exit 1)
          [ -n "${{ secrets.AZURE_OPENAI_KEY }}" ] || (echo "❌ Missing secret: AZURE_OPENAI_KEY" && exit 1)

          echo "✅ All required secrets are present"

      # ------------------------------------------------------------
      # 3) Azure Login using OIDC (Workload Identity Federation)
      #    Uses ARM_* secrets
      # ------------------------------------------------------------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.ARM_CLIENT_ID }}
          tenant-id:       ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        # azure/login + id-token:write is the standard GitHub→Azure OIDC pattern [1](https://journeyofthegeek.com/2023/04/06/authorization-in-azure-openai-service/)[2](https://bing.com/search?q=GitHub+Actions+is+not+permitted+to+create+or+approve+pull+requests+createPullRequest+allow+GitHub+Actions+to+create+and+approve+pull+requests)

      # ------------------------------------------------------------
      # 4) Extract issue details
      # ------------------------------------------------------------
      - name: Extract issue details
        shell: bash
        run: |
          set -euo pipefail
          echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV

          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 5) Call Azure OpenAI using API KEY
      #    Reason: token auth requires custom subdomain; otherwise API key is required [3](https://www.youtube.com/watch?v=nupZDYF5lMA)[4](https://www.youtube.com/watch?v=Chr0IeYQdk0)
      # ------------------------------------------------------------
      - name: Call Azure OpenAI (API key)
        env:
          AZURE_OPENAI_ENDPOINT:   ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_KEY:        ${{ secrets.AZURE_OPENAI_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          echo "::add-mask::$AZURE_OPENAI_KEY"

          ENDPOINT="${AZURE_OPENAI_ENDPOINT%/}"
          DEPLOYMENT="$AZURE_OPENAI_DEPLOYMENT"
          URL="$ENDPOINT/openai/deployments/$DEPLOYMENT/chat/completions?api-version=2024-02-15-preview"

          PAYLOAD="$RUNNER_TEMP/payload.json"
          AI_RESP="$RUNNER_TEMP/ai-response.json"
          RESULT="$RUNNER_TEMP/result.json"

          cat > "$PAYLOAD" <<'JSON'
          {
            "temperature": 0.2,
            "messages": [
              {
                "role": "system",
                "content": "You are a senior software engineer. Output ONLY valid JSON. No markdown. No explanations."
              },
              {
                "role": "user",
                "content": "Generate production-ready code for the GitHub issue below.\n\nReturn ONLY JSON with this schema:\n{\n  \"files\": [\n    {\"path\": \"relative/path/to/file.ext\", \"content\": \"file content\"}\n  ],\n  \"summary\": \"short summary\",\n  \"notes\": \"important notes\"\n}\n\nRules:\n- Output JSON only\n- files must be NON-EMPTY array\n- Paths must be relative and must not contain '..'\n- Do NOT modify .github/workflows/auto-code-generation.yml\n- Only update existing workflow files under .github/workflows/ if needed (do NOT create new ones)\n\nISSUE TITLE:\n__TITLE__\n\nISSUE BODY:\n__BODY__\n"
              }
            ]
          }
          JSON

          python3 - "$PAYLOAD" <<'PY'
          import json, os, sys
          payload = sys.argv[1]
          with open(payload, "r", encoding="utf-8") as f:
              data = json.load(f)
          title = os.environ.get("ISSUE_TITLE","")
          body  = os.environ.get("ISSUE_BODY","")
          data["messages"][1]["content"] = data["messages"][1]["content"].replace("__TITLE__", title).replace("__BODY__", body)
          with open(payload, "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False)
          PY

          HTTP_CODE="$(curl -sS -o "$AI_RESP" -w "%{http_code}" \
            "$URL" \
            -H "Content-Type: application/json" \
            -H "api-key: $AZURE_OPENAI_KEY" \
            --data-binary @"$PAYLOAD" || true)"

          echo "HTTP_CODE=$HTTP_CODE" >> $GITHUB_ENV
          echo "AI_RESP=$AI_RESP" >> $GITHUB_ENV
          echo "RESULT=$RESULT" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 6) Validate Azure response (fail-fast)
      # ------------------------------------------------------------
      - name: Validate Azure OpenAI response (fail fast)
        shell: bash
        run: |
          set -euo pipefail
          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ Azure OpenAI call failed with HTTP ${HTTP_CODE}"
            head -c 2000 "$AI_RESP" || true
            exit 1
          fi

          python3 - <<'PY'
          import json, os, sys
          ai_resp = os.environ["AI_RESP"]
          result_path = os.environ["RESULT"]

          with open(ai_resp, "r", encoding="utf-8") as f:
              raw = json.load(f)

          content = raw["choices"][0]["message"]["content"]
          try:
              result = json.loads(content)
          except Exception as e:
              print("❌ Model did not return valid JSON:", e)
              print(content[:2000])
              sys.exit(1)

          files = result.get("files")
          if not isinstance(files, list) or len(files) == 0:
              print("❌ JSON missing non-empty files[]")
              sys.exit(1)

          with open(result_path, "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print("✅ Azure response valid JSON with non-empty files[]")
          PY

      # ------------------------------------------------------------
      # 7) Write generated files safely
      # ------------------------------------------------------------
      - name: Write generated files safely
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys

          result_path = os.environ["RESULT"]
          with open(result_path, "r", encoding="utf-8") as f:
              result = json.load(f)

          blocked_exact = {
              ".github/workflows/auto-code-generation.yml",
              ".github/workflows/auto-code-generation.yaml"
          }
          blocked_prefixes = [".git/"]

          for item in result["files"]:
              path = item.get("path","")
              content = item.get("content","")

              if not isinstance(path, str) or not path.strip():
                  print("❌ Invalid file path")
                  sys.exit(1)

              if path.startswith(("/", "\\")):
                  print(f"❌ Absolute path blocked: {path}")
                  sys.exit(1)

              if ".." in path.split("/"):
                  print(f"❌ Path traversal blocked: {path}")
                  sys.exit(1)

              if path in blocked_exact:
                  print(f"❌ Protected file blocked: {path}")
                  sys.exit(1)

              for bp in blocked_prefixes:
                  if path.startswith(bp):
                      print(f"❌ Protected path blocked: {path}")
                      sys.exit(1)

              # allow editing existing workflows but block creating new ones
              if path.startswith(".github/workflows/") and not os.path.exists(path):
                  print(f"❌ Creating new workflow files is blocked: {path}")
                  sys.exit(1)

              os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
              with open(path, "w", encoding="utf-8") as wf:
                  wf.write(content)

              print(f"Wrote: {path}")
          PY

      # ------------------------------------------------------------
      # 8) Create branch, commit, push
      # ------------------------------------------------------------
      - name: Create branch and commit changes
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -B "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "❌ No changes produced by AI. Failing to avoid empty PR."
            exit 1
          fi

          git commit -m "Auto-fix for issue #$ISSUE_NUMBER"
          git push --force-with-lease origin "$BRANCH"

      # ------------------------------------------------------------
      # 9) Create PR + close issue
      # ------------------------------------------------------------
      - name: Create PR (or reuse existing) and close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          if gh pr view --head "$BRANCH" >/dev/null 2>&1; then
            echo "✅ PR already exists for $BRANCH. Skipping PR creation."
          else
            set +e
            gh pr create \
              --title "Auto fix: $ISSUE_TITLE" \
              --body "Auto-generated by Azure OpenAI for issue #$ISSUE_NUMBER." \
              --base main \
              --head "$BRANCH"
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then
              echo "❌ PR creation failed."
              echo "Fix: Repo Settings → Actions → General → enable 'Allow GitHub Actions to create and approve pull requests'."
              exit 1
            fi
          fi

          gh issue close "$ISSUE_NUMBER" --comment "✅ Issue fixed and PR created/updated automatically."

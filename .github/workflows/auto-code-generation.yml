name: Auto Code Generation with Azure OpenAI

on:
  issues:
    types:
      - opened
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    if: >
      (
        github.event.action == 'opened' &&
        contains(join(github.event.issue.labels.*.name, ','), 'autofix')
      ) || (
        github.event.action == 'labeled' &&
        contains(github.event.label.name, 'autofix')
      )

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "BRANCH=autofix/issue-${{ github.event.issue.number }}" >> $GITHUB_ENV
          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Call Azure OpenAI (GPT-4o)
        id: ai
        env:
          ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          PROMPT=$(cat <<'JSON'
          You are a senior software engineer.

          Analyze the GitHub issue and return ONLY valid JSON:
          {
            "files": [
              {
                "path": "path/to/file",
                "content": "file content"
              }
            ],
            "summary": "short summary"
          }
          ISSUE:
          JSON
          )

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT\nTitle: $ISSUE_TITLE\nBody: $ISSUE_BODY" \
            '{
              messages: [{ role: "user", content: $prompt }],
              temperature: 0.2
            }')

          curl -s "$ENDPOINT/openai/deployments/$DEPLOYMENT/chat/completions?api-version=2024-02-01" \
            -H "Content-Type: application/json" \
            -H "api-key: $KEY" \
            -d "$PAYLOAD" \
            | jq -r '.choices[0].message.content' > result.json

      - name: Validate & write files
        run: |
          jq '.files[]' result.json > /dev/null

          jq -c '.files[]' result.json | while read file; do
            path=$(echo "$file" | jq -r '.path')
            content=$(echo "$file" | jq -r '.content')
            mkdir -p "$(dirname "$path")"
            echo "$content" > "$path"
          done

      - name: Create branch and commit
        run: |
          git checkout -b "$BRANCH"
          git config user.name "autofix-bot"
          git config user.email "autofix@github.com"
          git add .
          git commit -m "autofix: issue #${{ github.event.issue.number }}"

      - name: Push branch
        run: |
          git push origin "$BRANCH"

      - name: Create Pull Request
        uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: process.env.BRANCH,
              base: "main",
              title: `Autofix: #${{ github.event.issue.number }} ${{ github.event.issue.title }}`,
              body: `✅ Auto-generated code\n\nCloses #${{ github.event.issue.number }}`
            });
            core.setOutput("url", pr.data.html_url);

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });

name: Auto Code Generation with Azure AI Foundry

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autofix-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    name: Issue → Foundry → PR → Close Issue
    runs-on: ubuntu-latest

    env:
      FOUNDRY_ENDPOINT: ${{ secrets.AZURE_FOUNDRY_ENDPOINT }}
      FOUNDRY_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY }}
      FOUNDRY_MODEL: ${{ secrets.AZURE_FOUNDRY_MODEL }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}

    steps:
      # ----------------------------------------------------
      # 1. Checkout main branch
      # ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # ----------------------------------------------------
      # 2. Call Azure AI Foundry (CORRECT API VERSION)
      # ----------------------------------------------------
      - name: Call Azure AI Foundry
        run: |
          echo "Calling Azure AI Foundry..."

          curl -sS -X POST \
            "$FOUNDRY_ENDPOINT/models/chat/completions?api-version=2024-05-01-preview" \
            -H "Authorization: Bearer $FOUNDRY_API_KEY" \
            -H "Content-Type: application/json" \
            -o foundry_response.json \
            -d '{
              "model": "'"$FOUNDRY_MODEL"'",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a senior DevOps engineer. Output ONLY valid Dockerfile content. No markdown. No explanation."
                },
                {
                  "role": "user",
                  "content": "Create a production-ready Dockerfile for a Node.js 22 application. Use multistage build, non-root user, and best practices."
                }
              ],
              "temperature": 0.2
            }'

      # ----------------------------------------------------
      # 3. Generate Dockerfile from Foundry response
      # ----------------------------------------------------
      - name: Create Dockerfile
        run: |
          jq -r '.choices[0].message.content' foundry_response.json > Dockerfile
          echo "Generated Dockerfile:"
          cat Dockerfile

      # ----------------------------------------------------
      # 4. Commit changes (stay on main)
      # ----------------------------------------------------
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "Add Dockerfile for Node.js 22 (Issue #${ISSUE_NUMBER})"

      # ----------------------------------------------------
      # 5. Create Pull Request (action creates branch)
      # ----------------------------------------------------
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: autofix/issue-${{ env.ISSUE_NUMBER }}
          commit-message: "Auto-fix for issue #${{ env.ISSUE_NUMBER }}"
          title: "Auto-fix: Issue #${{ env.ISSUE_NUMBER }}"
          body: |
            This PR was generated automatically using **Azure AI Foundry**.

            - Issue: #${{ env.ISSUE_NUMBER }}
            - Model: ${{ env.FOUNDRY_MODEL }}
          labels: automated, ai-fix
          delete-branch: false

      # ----------------------------------------------------
      # 6. Close the GitHub issue
      # ----------------------------------------------------
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            })

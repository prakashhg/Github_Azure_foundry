name: Auto Code Generation with Azure OpenAI

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autofix-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    name: Issue → Azure OpenAI → Branch/Commit → PR → Close Issue
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 0) Guard + Debug (ALWAYS RUNS)
      #    This prevents the job itself from being "skipped".
      #    All other steps are gated by guard output.
      # ------------------------------------------------------------
      - name: Guard (run only if label is autofix)
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os

          event_path = os.environ["GITHUB_EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as f:
            ev = json.load(f)

          action = (ev.get("action") or "").strip().lower()
          issue = ev.get("issue") or {}
          labels = issue.get("labels") or []
          label_names = [(l.get("name","") or "") for l in labels]

          added_label = ""
          if action == "labeled":
            added_label = ((ev.get("label") or {}).get("name") or "")

          def norm(s): return s.strip().lower()
          label_set = set(norm(x) for x in label_names if x)
          added_norm = norm(added_label)

          ok_labels = {"autofix", "auto-fix", "auto fix"}

          if action == "opened":
            should_run = any(x in label_set for x in ok_labels)
            reason = f"opened: labels={sorted(label_set)}"
          elif action == "labeled":
            should_run = (added_norm in ok_labels) or any(x in label_set for x in ok_labels)
            reason = f"labeled: added={added_norm}, labels={sorted(label_set)}"
          else:
            should_run = False
            reason = f"action={action} not handled"

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as out:
            out.write(f"run={'true' if should_run else 'false'}\n")
            out.write(f"action={action}\n")
            out.write(f"added_label={added_norm}\n")
            out.write("labels=" + ",".join(sorted(label_set)) + "\n")
            out.write(f"reason={reason}\n")

          print(f"Guard decision run={should_run} | {reason}")
          PY

      - name: Debug event summary
        shell: bash
        run: |
          echo "action:      ${{ steps.guard.outputs.action }}"
          echo "added_label: ${{ steps.guard.outputs.added_label }}"
          echo "all_labels:  ${{ steps.guard.outputs.labels }}"
          echo "decision:    ${{ steps.guard.outputs.run }}"
          echo "reason:      ${{ steps.guard.outputs.reason }}"

      # Optional: comment on issue if label missing (helps users)
      - name: Comment when not eligible (missing label)
        if: steps.guard.outputs.run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⚠️ Auto-fix did not start because this issue does not have the required label. Add label **autofix** to trigger automation."

      # ------------------------------------------------------------
      # Everything below runs ONLY when guard says run=true
      # ------------------------------------------------------------
      - name: Checkout repository
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract issue details
        if: steps.guard.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV

          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Call Azure OpenAI (retry + capture HTTP)
      # FIXED: No more KeyError: PAYLOAD (Python gets payload path as argument)
      # Writes files into RUNNER_TEMP so they are NOT committed.
      # ------------------------------------------------------------
      - name: Call Azure OpenAI (retry + capture HTTP)
        if: steps.guard.outputs.run == 'true'
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        shell: bash
        run: |
          set -euo pipefail
          echo "::add-mask::$AZURE_OPENAI_KEY"

          ENDPOINT="${AZURE_OPENAI_ENDPOINT%/}"
          URL="$ENDPOINT/openai/deployments/$AZURE_OPENAI_DEPLOYMENT/chat/completions?api-version=2024-02-15-preview"

          PAYLOAD="$RUNNER_TEMP/payload.json"
          AI_RESP="$RUNNER_TEMP/ai-response.json"
          RESULT="$RUNNER_TEMP/result.json"

          cat > "$PAYLOAD" <<'JSON'
          {
            "temperature": 0.2,
            "messages": [
              {
                "role": "system",
                "content": "You are a senior software engineer. Output ONLY valid JSON. No markdown. No explanations."
              },
              {
                "role": "user",
                "content": "Generate production-ready code for the GitHub issue below.\n\nReturn ONLY JSON with this schema:\n{\n  \"files\": [\n    {\"path\": \"relative/path/to/file.ext\", \"content\": \"file content\"}\n  ],\n  \"summary\": \"short summary\",\n  \"notes\": \"important notes\"\n}\n\nRules:\n- files must be NON-EMPTY array\n- paths must be relative (no leading /)\n- no .. in paths\n- do not modify .github/workflows/*\n- output JSON only\n\nISSUE TITLE:\n__TITLE__\n\nISSUE BODY:\n__BODY__\n"
              }
            ]
          }
          JSON

          # Inject issue data safely (pass payload path as argument)
          python3 - "$PAYLOAD" <<'PY'
          import json, os, sys
          payload = sys.argv[1]
          with open(payload, "r", encoding="utf-8") as f:
            data = json.load(f)
          title = os.environ.get("ISSUE_TITLE", "")
          body  = os.environ.get("ISSUE_BODY", "")
          data["messages"][1]["content"] = data["messages"][1]["content"].replace("__TITLE__", title).replace("__BODY__", body)
          with open(payload, "w", encoding="utf-8") as f:
            json.dump(data, f, ensure_ascii=False)
          PY

          attempts=3
          HTTP_CODE="000"

          for i in $(seq 1 $attempts); do
            echo "Attempt $i/$attempts calling Azure OpenAI..."
            HTTP_CODE=$(curl -sS -o "$AI_RESP" -w "%{http_code}" \
              "$URL" \
              -H "Content-Type: application/json" \
              -H "api-key: $AZURE_OPENAI_KEY" \
              --data-binary @"$PAYLOAD" || true)

            echo "HTTP_CODE=$HTTP_CODE"
            if [ "$HTTP_CODE" -eq 200 ]; then break; fi

            echo "Waiting 12 seconds before retry..."
            sleep 12
          done

          echo "HTTP_CODE=$HTTP_CODE" >> $GITHUB_ENV
          echo "AI_RESP=$AI_RESP" >> $GITHUB_ENV
          echo "RESULT=$RESULT" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Validate Azure response (Fail Fast = RED + stop)
      # ------------------------------------------------------------
      - name: Validate Azure OpenAI response (fail fast)
        if: steps.guard.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ Azure OpenAI call failed with HTTP ${HTTP_CODE}"
            echo "Response (truncated):"
            head -c 2000 "$AI_RESP" || true
            exit 1
          fi

          python3 - <<'PY'
          import json, os, sys
          ai_resp = os.environ["AI_RESP"]
          result_path = os.environ["RESULT"]

          with open(ai_resp, "r", encoding="utf-8") as f:
            raw = json.load(f)

          try:
            content = raw["choices"][0]["message"]["content"]
          except Exception:
            print("❌ Missing choices[0].message.content")
            sys.exit(1)

          try:
            result = json.loads(content)
          except Exception as e:
            print("❌ Model did not return valid JSON:", e)
            print(content[:2000])
            sys.exit(1)

          files = result.get("files")
          if not isinstance(files, list) or len(files) == 0:
            print("❌ JSON missing non-empty files[]")
            sys.exit(1)

          with open(result_path, "w", encoding="utf-8") as f:
            json.dump(result, f, ensure_ascii=False, indent=2)

          print("✅ Azure response valid JSON with non-empty files[]")
          PY

      # ------------------------------------------------------------
      # Write generated files safely (block workflow edits + traversal)
      # ------------------------------------------------------------
      - name: Write generated files safely
        if: steps.guard.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys
          result_path = os.environ["RESULT"]
          with open(result_path, "r", encoding="utf-8") as f:
            result = json.load(f)

          blocked_prefixes = [".github/workflows/", ".git/"]

          for item in result["files"]:
            path = item.get("path","")
            content = item.get("content","")

            if not isinstance(path, str) or not path.strip():
              print("❌ Invalid file path")
              sys.exit(1)

            if path.startswith(("/", "\\")) or ".." in path.split("/"):
              print(f"❌ Unsafe path blocked: {path}")
              sys.exit(1)

            for bp in blocked_prefixes:
              if path.startswith(bp):
                print(f"❌ Protected path blocked: {path}")
                sys.exit(1)

            os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
            with open(path, "w", encoding="utf-8") as wf:
              wf.write(content)

            print(f"Wrote: {path}")
          PY

      # ------------------------------------------------------------
      # Branch + commit + push (handles existing branch)
      # Fixes non-fast-forward using --force-with-lease
      # ------------------------------------------------------------
      - name: Create branch and commit changes
        if: steps.guard.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -B "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "❌ No changes produced by AI. Failing to avoid empty PR."
            exit 1
          fi

          git commit -m "Auto-fix for issue #$ISSUE_NUMBER"
          git push --force-with-lease origin "$BRANCH"

      # ------------------------------------------------------------
      # Create PR (or reuse existing), then close issue
      # ------------------------------------------------------------
      - name: Create PR (or reuse existing) and close issue
        if: steps.guard.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          if gh pr view --head "$BRANCH" >/dev/null 2>&1; then
            echo "✅ PR already exists for $BRANCH. Skipping PR creation."
          else
            gh pr create \
              --title "Auto fix: $ISSUE_TITLE" \
              --body "Auto-generated by Azure OpenAI for issue #$ISSUE_NUMBER." \
              --base main \
              --head "$BRANCH"
          fi

          gh issue close "$ISSUE_NUMBER" --comment "✅ Issue fixed and PR created/updated automatically."

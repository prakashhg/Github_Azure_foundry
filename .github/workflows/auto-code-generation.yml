name: Auto Code Generation with Azure OpenAI

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    if: >
      contains(join(github.event.issue.labels.*.name, ','), 'autofix')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract issue details
        id: issue
        run: |
          echo "TITLE<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "BODY<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Call Azure OpenAI
        id: ai
        env:
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
        run: |
          curl -s "${AZURE_OPENAI_ENDPOINT}/openai/deployments/gpt-4o/chat/completions?api-version=2024-02-15-preview" \
            -H "Content-Type: application/json" \
            -H "api-key: $AZURE_OPENAI_KEY" \
            -d "{
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"You are a senior engineer. Generate code for this issue. Respond ONLY in JSON with files[]. Issue: $TITLE $BODY\"
              }]
            }" \
          | jq -r '.choices[0].message.content' > result.json

      - name: Write generated files
        run: |
          jq -c '.files[]' result.json | while read file; do
            path=$(echo "$file" | jq -r '.path')
            content=$(echo "$file" | jq -r '.content')

            mkdir -p "$(dirname "$path")"
            echo "$content" > "$path"
          done

      - name: Create branch and commit
        run: |
          git checkout -b auto/issue-${{ github.event.issue.number }}
          git add .
          git commit -m "Auto-fix issue #${{ github.event.issue.number }}"
          git push origin auto/issue-${{ github.event.issue.number }}

      - name: Create PR and close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Auto fix: $TITLE" \
            --body "Generated by Azure OpenAI" \
            --base main \
            --head auto/issue-${{ github.event.issue.number }}

          gh issue close ${{ github.event.issue.number }}

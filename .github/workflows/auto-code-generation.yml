name: Auto Code Generation with Azure OpenAI (OIDC)

on:
  issues:
    types: [labeled]  # ✅ single run; no "opened" event

permissions:
  id-token: write          # ✅ required for OIDC token minting [1](https://christosgalano.github.io/github-actions-permissions/)
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autofix-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    name: Issue → Azure OpenAI (OIDC) → Branch/Commit → PR → Close Issue
    runs-on: ubuntu-latest

    # ✅ Only run when the label that was added is autofix (or variants)
    if: >
      github.event.label.name == 'autofix' ||
      github.event.label.name == 'auto-fix' ||
      github.event.label.name == 'auto fix' ||
      github.event.label.name == 'AutoFix' ||
      github.event.label.name == 'Auto-Fix'

    steps:
      # ------------------------------------------------------------
      # 0) Quick debug header
      # ------------------------------------------------------------
      - name: Debug trigger
        shell: bash
        run: |
          echo "action:      ${{ github.event.action }}"
          echo "label added: ${{ github.event.label.name }}"
          echo "issue:       #${{ github.event.issue.number }}"
          echo "actor:       ${{ github.actor }}"

      # ------------------------------------------------------------
      # 1) Checkout repository
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2) Validate required secrets exist (safe; doesn't print values)
      # ------------------------------------------------------------
      - name: Validate required secrets exist (safe)
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ secrets.ARM_CLIENT_ID }}" ] || (echo "❌ Missing secret: ARM_CLIENT_ID" && exit 1)
          [ -n "${{ secrets.ARM_TENANT_ID }}" ] || (echo "❌ Missing secret: ARM_TENANT_ID" && exit 1)
          [ -n "${{ secrets.ARM_SUBSCRIPTION_ID }}" ] || (echo "❌ Missing secret: ARM_SUBSCRIPTION_ID" && exit 1)
          [ -n "${{ secrets.AZURE_OPENAI_ENDPOINT }}" ] || (echo "❌ Missing secret: AZURE_OPENAI_ENDPOINT" && exit 1)
          [ -n "${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" ] || (echo "❌ Missing secret: AZURE_OPENAI_DEPLOYMENT" && exit 1)
          echo "✅ Required secrets present"

      # ------------------------------------------------------------
      # 3) Azure Login using OIDC (Workload Identity Federation)
      #    - No client secret needed
      # ------------------------------------------------------------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.ARM_CLIENT_ID }}
          tenant-id:       ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        # OIDC login pattern per Microsoft Learn and GitHub OIDC docs [2](https://github.com/github/docs/blob/main/content/repositories/managing-your-repositorys-settings-and-features/enabling-features-for-your-repository/managing-github-actions-settings-for-a-repository.md)[1](https://christosgalano.github.io/github-actions-permissions/)

      # ------------------------------------------------------------
      # 4) Extract issue details
      # ------------------------------------------------------------
      - name: Extract issue details
        shell: bash
        run: |
          set -euo pipefail

          echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV

          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 5) Call Azure OpenAI using Entra ID Bearer token (OIDC → token)
      #    - No AZURE_OPENAI_KEY used
      # ------------------------------------------------------------
      - name: Call Azure OpenAI (OIDC bearer token)
        env:
          AZURE_OPENAI_ENDPOINT:   ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="${AZURE_OPENAI_ENDPOINT%/}"
          DEPLOYMENT="$AZURE_OPENAI_DEPLOYMENT"
          URL="$ENDPOINT/openai/deployments/$DEPLOYMENT/chat/completions?api-version=2024-02-15-preview"

          # Acquire token for Azure Cognitive Services scope (RBAC auth) [3](https://github.com/peter-evans/create-pull-request)[4](https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/enabling-features-for-your-repository/managing-github-actions-settings-for-a-repository)
          TOKEN="$(az account get-access-token \
            --resource https://cognitiveservices.azure.com/ \
            --query accessToken -o tsv)"

          PAYLOAD="$RUNNER_TEMP/payload.json"
          AI_RESP="$RUNNER_TEMP/ai-response.json"
          RESULT="$RUNNER_TEMP/result.json"

          cat > "$PAYLOAD" <<'JSON'
          {
            "temperature": 0.2,
            "messages": [
              {
                "role": "system",
                "content": "You are a senior software engineer. Output ONLY valid JSON. No markdown. No explanations."
              },
              {
                "role": "user",
                "content": "Generate production-ready code for the GitHub issue below.\n\nReturn ONLY JSON with this schema:\n{\n  \"files\": [\n    {\"path\": \"relative/path/to/file.ext\", \"content\": \"file content\"}\n  ],\n  \"summary\": \"short summary\",\n  \"notes\": \"important notes\"\n}\n\nRules:\n- Output JSON only\n- files must be NON-EMPTY array\n- Paths must be relative and must not contain '..'\n- Do NOT modify .github/workflows/auto-code-generation.yml\n- You MAY update existing workflow files under .github/workflows/ (like ci.yml) but MUST NOT create new workflow files\n\nISSUE TITLE:\n__TITLE__\n\nISSUE BODY:\n__BODY__\n"
              }
            ]
          }
          JSON

          python3 - "$PAYLOAD" <<'PY'
          import json, os, sys
          payload = sys.argv[1]
          with open(payload, "r", encoding="utf-8") as f:
              data = json.load(f)
          title = os.environ.get("ISSUE_TITLE","")
          body  = os.environ.get("ISSUE_BODY","")
          data["messages"][1]["content"] = data["messages"][1]["content"].replace("__TITLE__", title).replace("__BODY__", body)
          with open(payload, "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False)
          PY

          HTTP_CODE="$(curl -sS -o "$AI_RESP" -w "%{http_code}" \
            "$URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            --data-binary @"$PAYLOAD" || true)"

          echo "HTTP_CODE=$HTTP_CODE" >> $GITHUB_ENV
          echo "AI_RESP=$AI_RESP" >> $GITHUB_ENV
          echo "RESULT=$RESULT" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 6) Validate Azure response (fail-fast => RED)
      # ------------------------------------------------------------
      - name: Validate Azure OpenAI response (fail fast)
        shell: bash
        run: |
          set -euo pipefail

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ Azure OpenAI call failed with HTTP ${HTTP_CODE}"
            head -c 2000 "$AI_RESP" || true
            exit 1
          fi

          python3 - <<'PY'
          import json, os, sys
          ai_resp = os.environ["AI_RESP"]
          result_path = os.environ["RESULT"]

          with open(ai_resp, "r", encoding="utf-8") as f:
              raw = json.load(f)

          try:
              content = raw["choices"][0]["message"]["content"]
          except Exception:
              print("❌ Missing choices[0].message.content")
              sys.exit(1)

          try:
              result = json.loads(content)
          except Exception as e:
              print("❌ Model did not return valid JSON:", e)
              print(content[:2000])
              sys.exit(1)

          files = result.get("files")
          if not isinstance(files, list) or len(files) == 0:
              print("❌ JSON missing non-empty files[]")
              sys.exit(1)

          with open(result_path, "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print("✅ Azure response valid JSON with non-empty files[]")
          PY

      # ------------------------------------------------------------
      # 7) Write generated files safely
      #    - block absolute paths, traversal, .git/*
      #    - block editing this workflow
      #    - block creating new workflow files (allow editing existing)
      # ------------------------------------------------------------
      - name: Write generated files safely
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys

          result_path = os.environ["RESULT"]
          with open(result_path, "r", encoding="utf-8") as f:
              result = json.load(f)

          blocked_exact = {
              ".github/workflows/auto-code-generation.yml",
              ".github/workflows/auto-code-generation.yaml"
          }
          blocked_prefixes = [".git/"]

          for item in result["files"]:
              path = item.get("path","")
              content = item.get("content","")

              if not isinstance(path, str) or not path.strip():
                  print("❌ Invalid file path")
                  sys.exit(1)

              if path.startswith(("/", "\\")):
                  print(f"❌ Absolute path blocked: {path}")
                  sys.exit(1)

              if ".." in path.split("/"):
                  print(f"❌ Path traversal blocked: {path}")
                  sys.exit(1)

              if path in blocked_exact:
                  print(f"❌ Protected file blocked: {path}")
                  sys.exit(1)

              for bp in blocked_prefixes:
                  if path.startswith(bp):
                      print(f"❌ Protected path blocked: {path}")
                      sys.exit(1)

              # allow editing existing workflows but block creating new ones
              if path.startswith(".github/workflows/") and not os.path.exists(path):
                  print(f"❌ Creating new workflow files is blocked: {path}")
                  sys.exit(1)

              os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
              with open(path, "w", encoding="utf-8") as wf:
                  wf.write(content)

              print(f"Wrote: {path}")
          PY

      # ------------------------------------------------------------
      # 8) Create branch, commit, push (safe even if branch exists)
      # ------------------------------------------------------------
      - name: Create branch and commit changes
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -B "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "❌ No changes produced by AI. Failing to avoid empty PR."
            exit 1
          fi

          git commit -m "Auto-fix for issue #$ISSUE_NUMBER"
          git push --force-with-lease origin "$BRANCH"

      # ------------------------------------------------------------
      # 9) Create PR (or reuse), then close issue
      #    Requires GitHub setting: Allow Actions to create PRs [5](https://microsoft.github.io/autogen/dev/user-guide/core-user-guide/cookbook/azure-openai-with-aad-auth.html)[6](https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect)[7](https://bing.com/search?q=Azure+OpenAI+authentication+Azure+Active+Directory+OAuth+bearer+token+api-key+difference)
      # ------------------------------------------------------------
      - name: Create PR (or reuse existing) and close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          if gh pr view --head "$BRANCH" >/dev/null 2>&1; then
            echo "✅ PR already exists for $BRANCH. Skipping PR creation."
          else
            set +e
            gh pr create \
              --title "Auto fix: $ISSUE_TITLE" \
              --body "Auto-generated by Azure OpenAI (OIDC) for issue #$ISSUE_NUMBER." \
              --base main \
              --head "$BRANCH"
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then
              echo "❌ PR creation failed."
              echo "Fix: Repo Settings → Actions → General → enable 'Allow GitHub Actions to create and approve pull requests'."
              exit 1
            fi
          fi

          gh issue close "$ISSUE_NUMBER" --comment "✅ Issue fixed and PR created/updated automatically."

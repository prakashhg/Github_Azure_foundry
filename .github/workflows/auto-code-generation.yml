name: Auto Code Generation with Azure OpenAI

on:
  issues:
    types:
      - opened
      - reopened
      - edited

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  analyze-and-generate:
    runs-on: ubuntu-latest
    name: Analyze Issue & Generate Code
    
    env:
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
      GPT4O_DEPLOYMENT: "gpt4o-code-gen"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Extract issue details
      - name: Extract Issue Details
        id: issue-details
        run: |
          node scripts/extract-issue.js "${{ github.event.issue.title }}" "${{ github.event.issue.body }}" "${{ github.event.issue.number }}"
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      # Call Azure OpenAI to analyze issue and generate code
      - name: Generate Code with Azure OpenAI
        id: code-generation
        run: |
          node scripts/generate-code.js
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      # Create feature branch
      - name: Create Feature Branch
        id: create-branch
        run: |
          TIMESTAMP=$(date +%s)
          BRANCH_NAME="feature/issue-${{ github.event.issue.number }}-${TIMESTAMP}"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          git config user.name "Github-AI-Agent"
          git config user.email "github-ai-agent@github.com"
          git fetch origin
          git checkout -b ${BRANCH_NAME} origin/main

      # Write generated code to files
      - name: Write Code to Files
        run: |
          node scripts/write-generated-files.js "${{ steps.code-generation.outputs.generated_code }}" "${{ steps.code-generation.outputs.files_list }}"
        env:
          GENERATED_CODE: ${{ steps.code-generation.outputs.generated_code }}
          FILES_LIST: ${{ steps.code-generation.outputs.files_list }}

      # Commit changes
      - name: Commit Changes
        id: commit
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes_committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat: Auto-generated code for issue #${{ github.event.issue.number }}

            Issue Title: ${{ github.event.issue.title }}
            Generated by Azure OpenAI GPT-4o
            Issue: ${{ github.event.issue.html_url }}"
            echo "changes_committed=true" >> $GITHUB_OUTPUT
          fi

      # Push changes
      - name: Push to Feature Branch
        if: steps.commit.outputs.changes_committed == 'true'
        run: |
          git push origin ${{ steps.create-branch.outputs.branch_name }}

      # Create Pull Request
      - name: Create Pull Request
        if: steps.commit.outputs.changes_committed == 'true'
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AI-Generated] Fix/Feature for issue #${{ github.event.issue.number }}`,
              head: `${{ steps.create-branch.outputs.branch_name }}`,
              base: 'main',
              body: `## Auto-Generated Code for Issue #${{ github.event.issue.number }}

            **Issue Title:** ${{ github.event.issue.title }}

            **Issue Description:**
            ${{ github.event.issue.body }}

            ### Changes Made:
            - Auto-generated code using Azure OpenAI GPT-4o
            - Code follows project conventions
            - Ready for review

            **Generated by:** Azure OpenAI Code Generation Workflow
            **Related Issue:** ${{ github.event.issue.html_url }}

            ---
            *This PR was automatically created. Please review before merging.*`,
              reviewers: [],
              labels: ['auto-generated', 'ai-assisted']
            });
            
            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_url', pr.html_url);

      # Add comment to PR
      - name: Comment on Pull Request
        if: steps.commit.outputs.changes_committed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-pr.outputs.pr_number }},
              body: `## 🤖 AI Code Generation Summary

            ✅ Code has been automatically generated and committed to this PR.

            ### Details:
            - **Source Issue:** #${{ github.event.issue.number }}
            - **Generation Model:** Azure OpenAI GPT-4o
            - **Timestamp:** $(date)

            ### Next Steps:
            1. Review the generated code
            2. Run tests (if applicable)
            3. Request changes or approve
            4. Merge to main to close the issue

            ---
            *Generated by Azure OpenAI • Issue #${{ github.event.issue.number }}*`
            });

      # Close the original issue automatically
      - name: Close Original Issue
        if: steps.commit.outputs.changes_committed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              state: 'closed',
              state_reason: 'completed'
            });
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `## ✅ Issue Resolved

            This issue has been automatically resolved by AI code generation.

            **Generated PR:** #${{ steps.create-pr.outputs.pr_number }}
            
            The generated code is ready for review in the above pull request. Once the PR is merged, the code will be available in the main branch.

            ---
            *Closed by Azure OpenAI Code Generation Workflow*`
            });

      # Failure notification
      - name: Comment on Issue if Failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `## ⚠️ Code Generation Failed

            The automatic code generation process encountered an error.

            **Details:**
            - Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Issue: #${{ github.event.issue.number }}

            Please check the workflow logs and try again, or manually create a PR.

            ---
            *See workflow logs for details*`
            });

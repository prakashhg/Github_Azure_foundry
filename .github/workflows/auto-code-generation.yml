name: Auto Code Generation with Azure AI Foundry

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autofix-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    name: Issue → Foundry → Branch → PR → Close Issue
    runs-on: ubuntu-latest

    env:
      FOUNDRY_ENDPOINT: ${{ secrets.AZURE_FOUNDRY_ENDPOINT }}
      FOUNDRY_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY }}
      FOUNDRY_MODEL: ${{ secrets.AZURE_FOUNDRY_MODEL }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}

    steps:
      # ----------------------------------------------------
      # 1. Checkout repository
      # ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------
      # 2. Create working branch
      # ----------------------------------------------------
      - name: Create branch
        run: |
          BRANCH="autofix/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # ----------------------------------------------------
      # 3. Call Azure AI Foundry
      # ----------------------------------------------------
      - name: Call Azure AI Foundry
        id: foundry
        run: |
          echo "Calling Azure AI Foundry..."

          RESPONSE=$(curl -sS -X POST \
            "$FOUNDRY_ENDPOINT/models/chat/completions?api-version=2024-02-15-preview" \
            -H "Authorization: Bearer $FOUNDRY_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "'"$FOUNDRY_MODEL"'",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a senior software engineer. Output only corrected code."
                },
                {
                  "role": "user",
                  "content": "Fix the GitHub issue titled: '"$ISSUE_TITLE"'. Apply minimal, correct code changes."
                }
              ],
              "temperature": 0.2
            }')

          echo "$RESPONSE" > foundry_response.json

      # ----------------------------------------------------
      # 4. Apply generated code (example assumes README change)
      # Adjust this logic for your real use case
      # ----------------------------------------------------
      - name: Apply code changes
        run: |
          jq -r '.choices[0].message.content' foundry_response.json > GENERATED_OUTPUT.txt
          echo "## Auto-generated Fix" >> README.md
          cat GENERATED_OUTPUT.txt >> README.md

      # ----------------------------------------------------
      # 5. Commit changes
      # ----------------------------------------------------
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto fix for issue #${ISSUE_NUMBER}"

      # ----------------------------------------------------
      # 6. Push branch
      # ----------------------------------------------------
      - name: Push branch
        run: |
          git push origin "$BRANCH"

      # ----------------------------------------------------
      # 7. Create Pull Request
      # ----------------------------------------------------
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ env.BRANCH }}
          title: "Auto-fix: Issue #${{ env.ISSUE_NUMBER }}"
          body: |
            This PR was generated automatically using **Azure AI Foundry**.

            - Issue: #${{ env.ISSUE_NUMBER }}
            - Model: ${{ env.FOUNDRY_MODEL }}
          labels: automated, ai-fix

      # ----------------------------------------------------
      # 8. Close issue after PR
      # ----------------------------------------------------
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            })

name: Auto Code Generation with Azure OpenAI

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autofix-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    name: Issue → Azure OpenAI → Branch/Commit → PR → Close Issue
    runs-on: ubuntu-latest

    # Only run when label "autofix" exists on the issue
    if: >
      github.event.issue.labels &&
      contains(join(github.event.issue.labels.*.name, ','), 'autofix')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract issue details
        shell: bash
        run: |
          set -euo pipefail

          echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV

          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Call Azure OpenAI (retry + capture HTTP) - writes artifacts to RUNNER_TEMP
      # ------------------------------------------------------------
      - name: Call Azure OpenAI (retry + capture HTTP)
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        shell: bash
        run: |
          set -euo pipefail

          # Mask key from logs
          echo "::add-mask::$AZURE_OPENAI_KEY"

          ENDPOINT="${AZURE_OPENAI_ENDPOINT%/}"
          URL="$ENDPOINT/openai/deployments/$AZURE_OPENAI_DEPLOYMENT/chat/completions?api-version=2024-02-15-preview"

          PAYLOAD="$RUNNER_TEMP/payload.json"
          AI_RESP="$RUNNER_TEMP/ai-response.json"
          RESULT="$RUNNER_TEMP/result.json"

          # Build payload template
          cat > "$PAYLOAD" <<'JSON'
          {
            "temperature": 0.2,
            "messages": [
              {
                "role": "system",
                "content": "You are a senior software engineer. Output ONLY valid JSON. No markdown. No explanations."
              },
              {
                "role": "user",
                "content": "Generate production-ready code for the GitHub issue below.\n\nReturn ONLY JSON with this schema:\n{\n  \"files\": [\n    {\"path\": \"relative/path/to/file.ext\", \"content\": \"file content\"}\n  ],\n  \"summary\": \"short summary\",\n  \"notes\": \"important notes\"\n}\n\nRules:\n- files must be NON-EMPTY array\n- paths must be relative (no leading /)\n- no .. in paths\n- do not modify .github/workflows/*\n- do not output anything except JSON\n\nISSUE TITLE:\n__TITLE__\n\nISSUE BODY:\n__BODY__\n"
              }
            ]
          }
          JSON

          # Inject issue data safely
          python3 - <<'PY'
          import json, os
          payload = os.environ["PAYLOAD"]
          with open(payload, "r", encoding="utf-8") as f:
              data = json.load(f)
          title = os.environ.get("ISSUE_TITLE", "")
          body = os.environ.get("ISSUE_BODY", "")
          data["messages"][1]["content"] = data["messages"][1]["content"].replace("__TITLE__", title).replace("__BODY__", body)
          with open(payload, "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False)
          PY

          attempts=3
          HTTP_CODE="000"

          for i in $(seq 1 $attempts); do
            echo "Attempt $i/$attempts calling Azure OpenAI..."
            HTTP_CODE=$(curl -sS -o "$AI_RESP" -w "%{http_code}" \
              "$URL" \
              -H "Content-Type: application/json" \
              -H "api-key: $AZURE_OPENAI_KEY" \
              --data-binary @"$PAYLOAD" || true)

            echo "HTTP_CODE=$HTTP_CODE"

            # Success
            if [ "$HTTP_CODE" -eq 200 ]; then
              break
            fi

            # Respect low rate limits (you observed ~1 request / 10 sec)
            echo "Waiting 12 seconds before retry..."
            sleep 12
          done

          echo "HTTP_CODE=$HTTP_CODE" >> $GITHUB_ENV
          echo "AI_RESP=$AI_RESP" >> $GITHUB_ENV
          echo "RESULT=$RESULT" >> $GITHUB_ENV
          echo "PAYLOAD=$PAYLOAD" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Fail-fast validation (turn pipeline RED + stop)
      # ------------------------------------------------------------
      - name: Validate Azure OpenAI response (fail fast)
        shell: bash
        run: |
          set -euo pipefail
          echo "Validating Azure OpenAI response..."

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ Azure OpenAI call failed with HTTP ${HTTP_CODE}"
            echo "Response (truncated):"
            head -c 2000 "$AI_RESP" || true
            exit 1
          fi

          python3 - <<'PY'
          import json, os, sys

          ai_resp = os.environ["AI_RESP"]
          result_path = os.environ["RESULT"]

          with open(ai_resp, "r", encoding="utf-8") as f:
              raw = json.load(f)

          try:
              content = raw["choices"][0]["message"]["content"]
          except Exception:
              print("❌ Missing choices[0].message.content in Azure response")
              sys.exit(1)

          try:
              result = json.loads(content)
          except Exception as e:
              print("❌ Model did not return valid JSON.")
              print("Error:", e)
              print("Raw content (first 2000 chars):", content[:2000])
              sys.exit(1)

          files = result.get("files")
          if not isinstance(files, list) or len(files) == 0:
              print("❌ JSON missing non-empty files[]")
              sys.exit(1)

          with open(result_path, "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print("✅ Azure response valid JSON with non-empty files[]")
          PY

      # ------------------------------------------------------------
      # Write generated files safely (block workflow edits + path traversal)
      # ------------------------------------------------------------
      - name: Write generated files safely
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json, os, sys

          result_path = os.environ["RESULT"]
          with open(result_path, "r", encoding="utf-8") as f:
              result = json.load(f)

          blocked_prefixes = [".github/workflows/", ".git/"]

          for item in result["files"]:
              path = item.get("path", "")
              content = item.get("content", "")

              if not isinstance(path, str) or not path.strip():
                  print("❌ Invalid path in files[]")
                  sys.exit(1)

              # Relative paths only
              if path.startswith("/") or path.startswith("\\"):
                  print(f"❌ Absolute path blocked: {path}")
                  sys.exit(1)

              # Block traversal
              parts = path.split("/")
              if ".." in parts:
                  print(f"❌ Path traversal blocked: {path}")
                  sys.exit(1)

              # Block workflow changes
              for bp in blocked_prefixes:
                  if path.startswith(bp):
                      print(f"❌ Protected path blocked: {path}")
                      sys.exit(1)

              os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
              with open(path, "w", encoding="utf-8") as wf:
                  wf.write(content)

              print(f"Wrote: {path}")
          PY

      # ------------------------------------------------------------
      # Create/update branch per issue, commit, push
      # Fixes: non-fast-forward by using --force-with-lease
      # ------------------------------------------------------------
      - name: Create branch and commit changes
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Create or reset the local branch to current HEAD
          git checkout -B "$BRANCH"

          git add .

          if git diff --cached --quiet; then
            echo "❌ No changes produced by AI. Failing to avoid empty PR."
            exit 1
          fi

          git commit -m "Auto-fix for issue #$ISSUE_NUMBER"

          # Safe force push so branch updates even if it already exists remotely
          git push --force-with-lease origin "$BRANCH"

      # ------------------------------------------------------------
      # Create PR (or reuse existing), then close issue
      # ------------------------------------------------------------
      - name: Create PR (or reuse existing) and close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="auto-fix/issue-$ISSUE_NUMBER"

          if gh pr view --head "$BRANCH" >/dev/null 2>&1; then
            echo "✅ PR already exists for $BRANCH. Skipping PR creation."
          else
            gh pr create \
              --title "Auto fix: $ISSUE_TITLE" \
              --body "This PR was automatically generated by Azure OpenAI for issue #$ISSUE_NUMBER." \
              --base main \
              --head "$BRANCH"
          fi

          gh issue close "$ISSUE_NUMBER" --comment "✅ Issue fixed and PR created/updated automatically."

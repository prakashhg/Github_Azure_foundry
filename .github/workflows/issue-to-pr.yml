name: "Issue -> Foundry agentic patch PR"

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  issue-to-pr:
    name: "Issue to PR (Foundry agentic)"
    runs-on: ubuntu-latest

    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      FOUNDRY_AGENT_ENDPOINT: ${{ secrets.FOUNDRY_AGENT_ENDPOINT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if this issue should run automation
        id: incident
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const hasLabel = (issue.labels || []).some(l => l.name === 'auto-patch' || l.name === 'foundry-auto');
            const runValue = hasLabel ? 'true' : 'false';
            core.notice(`hasLabel=${hasLabel} -> run=${runValue}`);
            return { run: runValue };

      - name: Debug incident output
        run: |
          echo "incident.run=${{ steps.incident.outputs.run }}"

      - name: Abort if issue does not contain actionable patch input
        if: steps.incident.outputs.run != 'true'
        run: |
          echo "No actionable patch; exiting."

      - name: Azure Login (OIDC)
        if: steps.incident.outputs.run == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: Call Foundry Agentic AI
        if: steps.incident.outputs.run == 'true'
        id: foundry
        run: |
          ISSUE_BODY="${{ github.event.issue.body || '' }}"

          PROMPT=$(awk 'BEGIN{RS="```prompt"} NR==2{sub(/^\n/,""); sub(/\n$$/,""); print; exit}' <<<"$ISSUE_BODY")
          if [ -z "$PROMPT" ]; then
            echo "No ```prompt block found; using full issue body as prompt.";
            PROMPT="$ISSUE_BODY"
          fi

          echo "Prompt to Foundry agent:"
          echo "$PROMPT"

          TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
          if [ -z "$TOKEN" ]; then
            echo "ERROR: unable to get access token" >&2
            exit 1
          fi

          RESPONSE=$(curl -sS -X POST "$FOUNDRY_AGENT_ENDPOINT" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"prompt\": $(jq -Rs . <<< \"$PROMPT\"), \"response_format\": \"diff\" }")

          echo "Foundry response:" >&2
          echo "$RESPONSE" >&2
          echo "$RESPONSE" > /tmp/foundry-response.txt

          # strip any markdown fences and keep raw diff in /tmp/foundry-response.txt
          if grep -q '^```' /tmp/foundry-response.txt; then
            awk 'BEGIN{inside=0} /^```/{inside=!inside; next} inside{print}' /tmp/foundry-response.txt > /tmp/foundry-response.tmp && mv /tmp/foundry-response.tmp /tmp/foundry-response.txt
          fi

      - name: Apply Foundry patch or add generated file
        if: steps.incident.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH=issue-${{ github.event.issue.number }}-auto-patch
          git checkout -b "$BRANCH"

          if grep -q '^diff --git' /tmp/foundry-response.txt; then
            cp /tmp/foundry-response.txt /tmp/issue.patch
            git apply /tmp/issue.patch
          else
            cp /tmp/foundry-response.txt generated-from-foundry.txt
            git add generated-from-foundry.txt
          fi

          git add -A
          git diff --staged --quiet || git commit -m "Auto apply Foundry agent patch from issue #${{ github.event.issue.number }}"

      - name: Create pull request from patch branch
        if: steps.incident.outputs.run == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: issue-${{ github.event.issue.number }}-auto-patch
          title: "[auto] Apply issue #${{ github.event.issue.number }} patch from Foundry agent"
          body: |
            This PR was auto-created from issue #${{ github.event.issue.number }}.

            Original issue title: ${{ github.event.issue.title }}
          base: main
          commit-message: "Auto apply Foundry agent patch from issue #${{ github.event.issue.number }}"

      - name: Close issue
        if: steps.incident.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.issues.update({
              ...context.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
